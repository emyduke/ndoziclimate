##
## Ndozi Climate — Nginx server block
## Source:   deploy/nginx/ndozi_climate.conf  (project repo)
## Install:  sudo cp deploy/nginx/ndozi_climate.conf /etc/nginx/sites-available/ndozi_climate
##           sudo ln -s /etc/nginx/sites-available/ndozi_climate /etc/nginx/sites-enabled/ndozi_climate
## Test:     sudo nginx -t && sudo systemctl reload nginx
## SSL:      sudo certbot --nginx -d ndoziclimate.org -d www.ndoziclimate.org
##

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ndoziclimate.org www.ndoziclimate.org;
    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ndoziclimate.org www.ndoziclimate.org;

    ssl_certificate     /etc/letsencrypt/live/ndoziclimate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ndoziclimate.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Static files (served directly by nginx — faster than Whitenoise)
    location /static/ {
        alias   /opt/ndozi_climate/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # User-uploaded media
    location /media/ {
        alias   /opt/ndozi_climate/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # All other requests → gunicorn (Django)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_redirect     off;
    }
}
