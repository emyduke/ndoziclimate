##
## YP WORLD — System Nginx Server Block
## Source:   deploy/nginx/ypworld.conf  (in the project repo)
## Install:  sudo cp deploy/nginx/ypworld.conf /etc/nginx/sites-available/ypworld
##           sudo ln -s /etc/nginx/sites-available/ypworld /etc/nginx/sites-enabled/ypworld
## Test:     sudo nginx -t && sudo systemctl reload nginx
## SSL:      sudo certbot --nginx -d ypsworld.com -d www.ypsworld.com
##

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ypsworld.com www.ypsworld.com;
    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ypsworld.com www.ypsworld.com;

    ssl_certificate     /etc/letsencrypt/live/ypsworld.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ypsworld.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # ── Django admin ──────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_redirect     off;
    }

    # ── Django REST API ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_redirect     off;
    }

    # ── Django static files (served by Whitenoise via gunicorn) ──────────────
    location /static/ {
        alias   /opt/ypsoldier/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Django media uploads ──────────────────────────────────────────────────
    location /media/ {
        alias   /opt/ypsoldier/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── React SPA (frontend container on port 3000) ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
